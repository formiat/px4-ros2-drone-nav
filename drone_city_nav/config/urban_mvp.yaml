    static_map_path: worlds/generated_city.map2d
    static_map_min_blocking_height_m: 0.0
    use_obstacle_memory: true
    planning_grid_resolution_m: 0.5
    planning_grid_width_m: 115.0
    planning_grid_height_m: 175.0
    planning_grid_origin_x: -10.0
    planning_grid_origin_y: -10.0
    use_current_lidar_obstacles: true
    max_current_lidar_staleness_s: 0.75
    max_lidar_range_m: 35.0
    range_hit_epsilon_m: 0.05
    current_lidar_obstacle_depth_m: 2.0
    scan_yaw_offset_rad: 0.0
    use_px4_heading_for_scan: true
    swap_lidar_xy_to_local_frame: false
    compensate_lidar_attitude: true
    lidar_mount_roll_rad: 0.0
    lidar_mount_pitch_rad: 0.0
    lidar_mount_yaw_rad: 0.0
    lidar_z_offset_m: 0.315
    min_projected_lidar_altitude_m: 1.0
    max_projected_lidar_altitude_m: 40.0
    astar_max_expansions: 500000
    astar_obstacle_clearance_cost_radius_m: 5.0
    astar_obstacle_clearance_cost_weight: 24.0
    astar_turn_cost_weight: 2.5
