obstacle_memory_node:
  ros__parameters:
    frame_id: map
    pose_source: px4_local_position
    lidar_topic: /scan
    px4_local_position_topic: /fmu/out/vehicle_local_position_v1
    obstacle_memory_grid_topic: /drone_city_nav/obstacle_memory_grid
    obstacle_memory_inflated_grid_topic: /drone_city_nav/obstacle_memory_inflated_grid
    grid_resolution_m: 0.5
    grid_width_m: 115.0
    grid_height_m: 175.0
    grid_origin_x: -10.0
    grid_origin_y: -10.0
    initial_x_m: 0.0
    initial_y_m: 0.0
    initial_heading_rad: 0.0
    use_initial_pose_until_px4: true
    max_pose_staleness_s: 1.0
    min_mapping_altitude_m: 16.0
    inflation_radius_m: 4.0
    scan_yaw_offset_rad: 0.0
    use_px4_heading_for_scan: false
    swap_lidar_xy_to_local_frame: true
    max_lidar_range_m: 35.0
    range_hit_epsilon_m: 0.05
    hit_obstacle_depth_m: 8.0
    scan_stride: 1
    hit_weight: 4
    miss_weight: 1
    min_score: -8
    max_score: 12
    occupied_score: 3
    free_score: -1

planner_node:
  ros__parameters:
    frame_id: map
    px4_local_position_topic: /fmu/out/vehicle_local_position_v1
    obstacle_memory_grid_topic: /drone_city_nav/obstacle_memory_grid
    occupancy_grid_topic: /drone_city_nav/occupancy_grid
    path_topic: /drone_city_nav/path
    current_waypoint_topic: /drone_city_nav/current_waypoint
    start_x_m: 0.0
    start_y_m: 0.0
    initial_x_m: 0.0
    initial_y_m: 0.0
    initial_heading_rad: 0.0
    use_initial_pose_until_px4: true
    max_pose_staleness_s: 1.0
    goal_x_m: 90.0
    goal_y_m: 150.0
    cruise_altitude_m: 18.0
    inflation_radius_m: 4.0
    direct_path_fallback: false
    reuse_last_valid_path_on_failure: false
    max_initial_lateral_deviation_m: 14.0
    nearest_free_radius_cells: 30
    memory_occupied_threshold: 65
    memory_free_threshold: 0
    astar_max_expansions: 100000
    replan_period_s: 1.5

px4_offboard_node:
  ros__parameters:
    path_topic: /drone_city_nav/path
    px4_local_position_topic: /fmu/out/vehicle_local_position_v1
    px4_vehicle_status_topic: /fmu/out/vehicle_status_v1
    offboard_control_mode_topic: /fmu/in/offboard_control_mode
    trajectory_setpoint_topic: /fmu/in/trajectory_setpoint
    vehicle_command_topic: /fmu/in/vehicle_command
    emergency_stop_topic: /drone_city_nav/emergency_stop
    cruise_altitude_m: 18.0
    min_navigation_altitude_m: 17.0
    face_target_yaw: false
    acceptance_radius_m: 1.0
    max_setpoint_distance_m: 1.5
    max_commanded_target_step_m: 0.25
    lookahead_distance_m: 2.5
    path_switch_hysteresis_m: 3.0
    path_continuity_reuse_radius_m: 6.0
    path_continuity_max_target_distance_m: 20.0
    warmup_setpoints: 20
    command_resend_period_s: 2.0
    auto_arm: true
    auto_offboard: true
    goal_x_m: 90.0
    goal_y_m: 150.0
    hold_x_m: 0.0
    hold_y_m: 0.0
    target_system: 1
    target_component: 1
    source_system: 1
    source_component: 1

lidar_debug_node:
  ros__parameters:
    lidar_topic: /scan
    px4_local_position_topic: /fmu/out/vehicle_local_position_v1
    occupancy_grid_topic: /drone_city_nav/obstacle_memory_inflated_grid
    path_topic: /drone_city_nav/path
    pointcloud_topic: /drone_city_nav/lidar_debug_points
    marker_topic: /drone_city_nav/obstacle_memory_markers
    publish_lidar_radar_markers: false
    output_dir: log/lidar_debug
    snapshot_period_s: 1.0
    image_size_px: 900
    scan_yaw_offset_rad: 0.0
    use_px4_heading_for_scan: false
    swap_lidar_xy_to_local_frame: true
    max_lidar_range_m: 35.0
    range_hit_epsilon_m: 0.05
    beam_csv_stride: 1
    image_beam_stride: 3
    max_logged_hit_points: 256
    max_snapshots: 0

