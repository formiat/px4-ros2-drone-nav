    obstacle_memory_inflated_grid_topic: /drone_city_nav/obstacle_memory_inflated_grid
    grid_resolution_m: 0.5
    grid_width_m: 115.0
    grid_height_m: 175.0
    grid_origin_x: -10.0
    grid_origin_y: -10.0
    initial_x_m: 18.0
    initial_y_m: 18.0
    initial_heading_rad: 0.0
    px4_local_origin_x_m: 18.0
    px4_local_origin_y_m: 18.0
    use_initial_pose_until_px4: true
    max_pose_staleness_s: 1.0
    min_mapping_altitude_m: 5.0
    inflation_radius_m: 3.5
    scan_yaw_offset_rad: 0.0
    use_px4_heading_for_scan: true
    swap_lidar_xy_to_local_frame: false
    compensate_lidar_attitude: true
    lidar_mount_roll_rad: 0.0
    lidar_mount_pitch_rad: 0.0
    lidar_mount_yaw_rad: 0.0
    lidar_z_offset_m: 0.315
    min_projected_lidar_altitude_m: 1.0
    max_projected_lidar_altitude_m: 40.0
    max_lidar_range_m: 35.0
    range_hit_epsilon_m: 0.05
    hit_obstacle_depth_m: 2.0
    scan_stride: 1
    hit_weight: 4
    miss_weight: 1
    min_score: -8
    max_score: 12
    occupied_score: 3
    free_score: -1

planner_node:
  ros__parameters:
    frame_id: map
    px4_local_position_topic: /fmu/out/vehicle_local_position_v1
    px4_vehicle_attitude_topic: /fmu/out/vehicle_attitude
