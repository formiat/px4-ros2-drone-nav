obstacle_memory_node:
  ros__parameters:
    frame_id: map
    pose_source: gps_compass
    lidar_topic: /scan
    mapping_enabled: true
    px4_local_position_topic: /fmu/out/vehicle_local_position_v1
    px4_vehicle_attitude_topic: /fmu/out/vehicle_attitude
    gps_topic: /fix
    compass_imu_topic: /imu
    obstacle_memory_grid_topic: /drone_city_nav/obstacle_memory_grid
    obstacle_memory_inflated_grid_topic: /drone_city_nav/obstacle_memory_inflated_grid
    grid_resolution_m: 0.5
    grid_width_m: 120.0
    grid_height_m: 80.0
    grid_origin_x: -20.0
    grid_origin_y: -40.0
    initial_heading_rad: 0.0
    use_initial_pose_until_px4: false
    max_pose_staleness_s: 1.0
    min_mapping_altitude_m: 0.0
    inflation_radius_m: 2.5
    scan_yaw_offset_rad: 0.0
    use_px4_heading_for_scan: true
    swap_lidar_xy_to_local_frame: false
    compensate_lidar_attitude: true
    lidar_mount_roll_rad: 0.0
    lidar_mount_pitch_rad: 0.0
    lidar_mount_yaw_rad: 0.0
    lidar_z_offset_m: 0.0
    min_projected_lidar_altitude_m: 0.0
    max_projected_lidar_altitude_m: 100.0
    max_lidar_range_m: 35.0
    range_hit_epsilon_m: 0.05
    hit_obstacle_depth_m: 4.0
    scan_stride: 1
    hit_weight: 4
    miss_weight: 1
    min_score: -8
    max_score: 12
    occupied_score: 3
    free_score: -1
    auto_initialize_origin: true
    origin_latitude_deg: 0.0
    origin_longitude_deg: 0.0
    origin_altitude_m: 0.0
    max_gps_staleness_s: 1.0
    max_compass_staleness_s: 1.0
    max_gps_horizontal_variance_m2: 25.0
    require_known_gps_covariance: false
    yaw_offset_rad: 0.0
    magnetic_declination_rad: 0.0
    compass_to_body_yaw_offset_rad: 0.0

planner_node:
  ros__parameters:
    frame_id: map
    px4_local_position_topic: /fmu/out/vehicle_local_position_v1
    px4_vehicle_attitude_topic: /fmu/out/vehicle_attitude
    lidar_topic: /scan
    obstacle_memory_grid_topic: /drone_city_nav/obstacle_memory_grid
    occupancy_grid_topic: /drone_city_nav/occupancy_grid
    static_map_grid_topic: /drone_city_nav/static_map_grid
    static_map_points_topic: /drone_city_nav/static_map_points
    static_map_debug_publish_period_s: 1.0
    path_topic: /drone_city_nav/path
    current_waypoint_topic: /drone_city_nav/current_waypoint
    start_x_m: 0.0
    start_y_m: 0.0
    use_initial_pose_until_px4: false
    max_pose_staleness_s: 1.0
    goal_x_m: 85.0
    goal_y_m: 0.0
    cruise_altitude_m: 12.0
    inflation_radius_m: 2.5
    direct_path_fallback: false
    reuse_last_valid_path_on_failure: false
    stable_path_reuse_enabled: true
    stable_path_reuse_max_deviation_m: 6.0
    stable_path_goal_tolerance_m: 3.0
    stable_path_blocking_blocked_length_m: 1.0
    stable_path_blocking_replan_horizon_m: 20.0
    stable_path_blocked_confirmations_required: 1
    max_initial_lateral_deviation_m: 8.0
    nearest_free_radius_cells: 10
    memory_occupied_threshold: 65
    memory_free_threshold: 0
    use_static_map: false
    static_map_path: ""
    static_map_min_blocking_height_m: 0.0
    use_obstacle_memory: true
    planning_grid_resolution_m: 0.5
    planning_grid_width_m: 120.0
    planning_grid_height_m: 80.0
    planning_grid_origin_x: -20.0
    planning_grid_origin_y: -40.0
    use_current_lidar_obstacles: true
    max_current_lidar_staleness_s: 0.75
    max_lidar_range_m: 35.0
    range_hit_epsilon_m: 0.05
    current_lidar_obstacle_depth_m: 4.0
    scan_yaw_offset_rad: 0.0
    use_px4_heading_for_scan: true
    swap_lidar_xy_to_local_frame: false
    compensate_lidar_attitude: true
    lidar_mount_roll_rad: 0.0
    lidar_mount_pitch_rad: 0.0
    lidar_mount_yaw_rad: 0.0
    lidar_z_offset_m: 0.0
    min_projected_lidar_altitude_m: 0.0
    max_projected_lidar_altitude_m: 100.0
    astar_max_expansions: 100000
    astar_evasive_maneuvering_enabled: false
    astar_evasive_maneuvering_straight_cost_weight: 1.0
    replan_period_s: 0.5

px4_offboard_node:
  ros__parameters:
    path_topic: /drone_city_nav/path
    px4_local_position_topic: /fmu/out/vehicle_local_position_v1
    px4_vehicle_status_topic: /fmu/out/vehicle_status_v1
    offboard_control_mode_topic: /fmu/in/offboard_control_mode
    trajectory_setpoint_topic: /fmu/in/trajectory_setpoint
    vehicle_command_topic: /fmu/in/vehicle_command
    emergency_stop_topic: /drone_city_nav/emergency_stop
    occupancy_grid_topic: /drone_city_nav/occupancy_grid
    cruise_altitude_m: 12.0
    min_navigation_altitude_m: 0.0
    takeoff_hover_s: 2.0
    acceptance_radius_m: 1.5
    max_setpoint_distance_m: 1.0
    max_commanded_target_step_m: 0.1
    min_commanded_target_lead_m: 0.0
    desired_speed_mps: 1.0
    max_accel_mps2: 0.75
    min_command_speed_mps: 0.0
    goal_slowdown_radius_m: 8.0
    braking_safety_margin_m: 1.5
    turn_slowdown_angle_rad: 0.65
    turn_slowdown_min_speed_mps: 0.5
    narrow_clearance_slowdown_radius_m: 4.0
    narrow_clearance_min_speed_mps: 0.4
    clearance_braking_margin_m: 0.5
    max_clearance_grid_staleness_s: 1.5
    telemetry_log_period_s: 0.5
    velocity_feedforward_enabled: false
    lookahead_distance_m: 3.0
    path_switch_hysteresis_m: 3.0
    path_continuity_reuse_radius_m: 6.0
    path_continuity_max_target_distance_m: 20.0
    goal_x_m: 85.0
    goal_y_m: 0.0
    warmup_setpoints: 20
    command_resend_period_s: 2.0
    auto_arm: false
    auto_offboard: false
    hold_x_m: 0.0
    hold_y_m: 0.0
    target_system: 1
    target_component: 1
    source_system: 1
    source_component: 1

